name: Daily Stock Update

on:
  schedule:
    # 每天台灣時間早上 8 點執行 (UTC 時間 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance google-generativeai

      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_daily_stocks.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily_stocks.json
          git commit -m "Automated daily stock data update" || exit 0
          git push
