<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 台股每日推薦儀表板</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: #2c3e50; }
        .date-badge { display: inline-block; background-color: #3498db; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 4px solid #e74c3c; }
        .stock-title { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .stock-title h2 { margin: 0; color: #e74c3c; }
        .stock-symbol { background: #eee; padding: 3px 8px; border-radius: 5px; font-size: 0.9em; color: #666; }
        .section-title { font-weight: bold; color: #2c3e50; margin-top: 15px; margin-bottom: 5px; }
        .price-box { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 15px; display: flex; justify-content: space-between; }
        .entry { color: #27ae60; font-weight: bold; }
        .exit { color: #c0392b; font-weight: bold; }
        .disclaimer { margin-top: 40px; font-size: 0.85em; color: #7f8c8d; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🤖 AI 台股每日推薦儀表板</h1>
        <div class="date-badge" id="update-date">載入中...</div>
    </header>

    <div class="grid" id="stock-container">
        </div>

    <div class="disclaimer">
        <p>⚠️ <strong>免責聲明：</strong> 本網頁由 AI 語言模型自動生成，所有分析與推薦價格僅供參考與學習交流之用，不構成任何投資建議。股市有風險，投資理財請務必自行審慎評估並盈虧自負。</p>
    </div>
</div>

<script>
    // 讀取 JSON 資料
    fetch('daily_stocks.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('update-date').innerText = `更新日期：${data.date}`;
            const container = document.getElementById('stock-container');
            
            data.recommendations.forEach(stock => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="stock-title">
                        <h2>${stock.name}</h2>
                        <span class="stock-symbol">${stock.symbol}</span>
                    </div>
                    <div class="section-title">💡 推薦理由</div>
                    <p>${stock.reason}</p>
                    <div class="section-title">⏱️ 進場時機</div>
                    <p>${stock.entry_timing}</p>
                    <div class="price-box">
                        <div>
                            <span class="section-title">進場區間</span><br>
                            <span class="entry">${stock.entry_price}</span>
                        </div>
                        <div>
                            <span class="section-title">停利/停損</span><br>
                            <span class="exit">${stock.exit_price}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            console.error('讀取資料失敗:', error);
            document.getElementById('stock-container').innerHTML = '<p style="color:red; text-align:center;">無法載入今日推薦資料，請稍後再試。</p>';
        });
</script>

</body>
</html>
